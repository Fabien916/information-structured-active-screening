trial_name: tensornet_pretrain_ensemble_last_layer_h8
trial_family: ensemble
backbone: tensornet
uncertainty_mode: gaussian
needs_pretrain: true
freeze_backbone: false
ensemble_heads: 8
ensemble_scheme: last_layer
model:
  hidden_dim: 48
  num_layers: 3
  dropout: 0.1
  torchmd:
    embedding_dim: 72
    num_layers: 3
    num_rbf: 32
    rbf_type: expnorm
    trainable_rbf: false
    activation: silu
    cutoff_lower: 0.0
    cutoff_upper: 4.5
    max_num_neighbors: 64
    dropout: 0.1
    reduce_op: sum
    equivariance_invariance_group: SO(3)
    static_shapes: true
    check_errors: true
    head_hidden_dim: 96
    head_num_layers: 3
    gaussian_warmup_epochs: 5
    gaussian_var_reg_beta: 3.0e-4
    gaussian_logvar_min: -8.0
    gaussian_logvar_max: 3.0
    gaussian_min_var: 1.0e-6
    gaussian_select_by: hybrid
    gaussian_select_nll_weight: 0.03
train:
  epochs: 80
  batch_size: 32
  lr: 3.0e-4
  encoder_lr: 5.0e-5
  weight_decay: 1.0e-5




