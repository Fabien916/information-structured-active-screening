trial_name: tensornet_scratch_nig
trial_family: scratch_nig
backbone: tensornet
uncertainty_mode: nig
needs_pretrain: false
freeze_backbone: false
ensemble_heads: 1
ensemble_scheme: full
model:
  hidden_dim: 48
  num_layers: 3
  dropout: 0.1
  torchmd:
    embedding_dim: 72
    num_layers: 3
    num_rbf: 32
    rbf_type: expnorm
    trainable_rbf: false
    activation: silu
    cutoff_lower: 0.0
    cutoff_upper: 4.5
    max_num_neighbors: 64
    dropout: 0.1
    reduce_op: sum
    equivariance_invariance_group: SO(3)
    static_shapes: true
    check_errors: true
    head_hidden_dim: 96
    head_num_layers: 3
    gaussian_logvar_min: -8.0
    gaussian_logvar_max: 3.0
    gaussian_min_var: 1.0e-6
    nig_warmup_epochs: 20
    nig_reg_lambda: 1.0e-4
train:
  epochs: 120
  batch_size: 32
  lr: 2.0e-4
  encoder_lr: 1.0e-5
  weight_decay: 1.0e-5


