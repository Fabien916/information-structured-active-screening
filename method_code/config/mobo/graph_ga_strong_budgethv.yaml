# Companion mobo config for --config config/surrogate/config.yaml
paths:
  init_library_csv: data_trim/tcm_library_heavy40_vocab9.csv
  init_library_smiles_col: smiles_canonical
  init_encoder_ckpt: null
  init_training_dataset_root: dataset/8UN4
  init_ligand_vocab_file: null
  output_dir: runs/graph_ga_8UN4_strong_budgethv

init_selection:
  library_max_rows: 0
  butina_cutoff: 0.6
  fp_radius: 2
  fp_bits: 2048
  init_train_valid_total: 480
  holdout_test_total: 120
  selection_seed: 42

experiment:
  rounds: 20
  seed: 42

population_baseline:
  method: graph_ga
  population_size: 256
  generations: 20
  candidate_keep_topk: 512
  start_pool_size: 960
  mating_pool_size: 8000
  mutation_rate: 1.0
  prune_population: true
  max_attempts_per_child: 48
  oracle_topk_per_generation: 32
